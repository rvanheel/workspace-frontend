schemaVersion: 2.3.0
attributes:
  controller.devfile.io/storage-type: per-workspace
metadata:
  name: workspace-frontend
  displayName: Frontend Development
  description: A Node.js development environment with Git repo preloaded and VS Code run/debug support

projects:
  - name: workspace-frontend
    git:
      checkoutFrom:
        remote: origin
        revision: main
      remotes:
        origin: https://github.com/rvanheel/workspace-frontend.git

components:
  - name: runtime
    container:
      image: docker.io/library/node:latest
      memoryRequest: 1Gi
      memoryLimit: 2Gi
      cpuRequest: 500m
      cpuLimit: 1000m
      mountSources: true
      sourceMapping: /projects
      env:
        - name: NODE_ENV
          value: development
        - name: VSCODE_DEFAULT_WORKSPACE
          value: /projects/workspace-frontend/workspace-frontend.code-workspace
      volumeMounts:
        - name: npm
          path: /home/user/.npm
      command:
        - sleep
        - infinity
      endpoints:
        - name: http-3000
          targetPort: 3000
          exposure: public      
        - name: node-debug-9229
          targetPort: 9229
          exposure: public
  - volume:
      size: 1Gi
    name: projects
  - volume:
      size: 2Gi
    name: npm

commands:
  - exec:
      commandLine: if [ -f package-lock.json ]; then npm ci; else npm install; fi
      component: runtime
      group:
        isDefault: true
        kind: build
      workingDir: '/projects/workspace-frontend'
    id: install    
  - exec:
      commandLine: npm run dev --if-present || npm start --if-present || tail -f /dev/null
      component: runtime
      group:
        isDefault: true
        kind: run
      label: Run development server
      workingDir: '/projects/workspace-frontend'
    id: run    
  - exec:
      commandLine: npm run debug --if-present || node --inspect=0.0.0.0:9229 index.js
      component: runtime
      group:
        isDefault: false
        kind: run
      label: Run Node.js in debug mode
      workingDir: '/projects/workspace-frontend'
    id: debug

events:
  postStart:
    - install
